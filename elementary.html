<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>My Media</title>
        <style>

            body {
                font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
                margin: 0;
                background: rgb(241, 223, 241);
                color: rgb(60, 20, 99);
            }
             
            header {
                background: rgb(26, 7, 10);
                color: white;
                padding: 20px;
                text-align: center;
            }

            nav {
                display: flex;
                justify-content: center;
                background: rgb(70, 63, 63);
                flex-wrap: wrap;
            }

            nav a, .dropbtn {
                background: none;
                border: none;
                color: white;
                padding: 14px 20px;
                cursor: pointer;
                font-size: 16px;
                text-decoration: none;
            }

            nav a:hover, nav a.active, .dropbtn:hover {
                background: rgb(182, 69, 139);
            }

            .dropdown {
                position: relative;
                display: inline-block;
            }

            .dropdown-content {
                display: none;
                position: absolute;
                background: rgb(26, 7, 10);
                background-color: #f9f9f9;
                min-width: 160px;
                box-shadow: 0px 8px 16px rgba(0, 0, 0, 0.2);
                z-index: 1;
                padding: 12px 16px;
            }

            .dropdown-content a {
                color: rgb(26, 7, 10);
                padding: 12px 16px;
                text-decoration: none;
                display: block;
            }

            .dropdown:hover .dropdown-content {
            display: block;
            }

            .media-header h2 {
                font-size: 2rem;
                text-align: center;
                color: rgb(60, 20, 99);
                margin-bottom: 20px;
            }

            .media-grid {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
                gap: 32px;
                padding: 32px;
            }

            .media-card {
                background: rgb(255, 246, 255);
                border-radius: 16px;
                box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
                overflow: hidden;
                display: flex;
                flex-direction: column;
                transition: transform 0.2s, box-shadow 0.2s;
                height: 100%; /* Make card fill the grid cell */
            }

            .media-card:hover {
                transform: translateY(-6px) scale(1.03);
                box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            }

            .media-card img {
                width: 100%;
                height: 200px;
                object-fit: cover;
                display: block;
                border-top-left-radius: 16px;
                border-top-right-radius: 16px;
                flex-shrink: 0;
            }

            .media-card-body {
                padding: 18px 16px 16px 16px;
                flex: 1 1 auto; /* Allow body to grow and fill remaining space */
                display: flex;
                flex-direction: column;
                justify-content: space-between;
            }

            .media-card h3 {
                margin: 0 0 8px;
                font-size: 1.2rem;
                color: rgb(60, 20, 99);
                text-align: center;
            }

            .media-card p {
                color: rgb(10, 77, 77);
                font-size: 0.9rem;
                margin-bottom: 8px;
            }

             .home-content {
                 display: flex;
                 flex-wrap: wrap;
             }

             .center-container {
            display: flex;
            justify-content: center; /* Centers horizontally */
            align-items: center; 
             }/* Centers vertically */

            footer {
                background: rgb(26, 7, 10);
                color: white;
                text-align: center;
                padding: 10px;
                position: -ms-page-footer;
                width: 100%;
            }
        </style>
    </head>
    <body>

<header>

</header>

<nav>
<a href="index.html" class="tab-btn">Home</a>

</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const tabButtons = document.querySelectorAll('.tab-btn');

        tabButtons.forEach(button => {
            button.addEventListener('click', function(event) {
                tabButtons.forEach(tab => tab.classList.remove('active'));
                this.classList.add('active');
            });
        });

        const currentPage = window.location.pathname.split('/').pop();
        tabButtons.forEach(button => {
            if (button.getAttribute('href') === currentPage || (currentPage === '' && button.getAttribute('href') === 'index.html')) {
                button.classList.add('active');
            }
        });
    });
</script>

</main>

</body>
</html>
