<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Welcome To My Website</title>
        <style>

            body {
                font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
                margin: 0;
                background: rgb(241, 223, 241);
                color: rgb(60, 20, 99);
            }
             
            header {
                background: rgb(26, 7, 10);
                color: white;
                padding: 20px;
                text-align: center;
            }

            nav {
                display: flex;
                justify-content: center;
                background: rgb(70, 63, 63);
                flex-wrap: wrap;
            }

            nav a, .dropbtn {
                background: none;
                border: none;
                color: white;
                padding: 14px 20px;
                cursor: pointer;
                font-size: 16px;
                text-decoration: none;
            }

            nav a:hover, nav a.active, .dropbtn:hover {
                background: rgb(182, 69, 139);
            }

            .dropdown {
                position: relative;
                display: inline-block;
            }

            .dropdown-content {
                display: none;
                position: absolute;
                background: rgb(26, 7, 10);
                background-color: #f9f9f9;
                min-width: 160px;
                box-shadow: 0px 8px 16px rgba(0, 0, 0, 0.2);
                z-index: 1;
                padding: 12px 16px;
            }

            .dropdown-content a {
                color: rgb(26, 7, 10);
                padding: 12px 16px;
                text-decoration: none;
                display: block;
            }

            .dropdown:hover .dropdown-content {
            display: block;
            }

            .about-section {
                max-width: 900px;
                margin: 50px auto;
                padding: 0 20px;
            }

            .image-container {
                text-align: center;
                margin-bottom: 20px;
            }

            .image-container img {
                width: 250px;
                height: 250px;
                object-fit: cover;
                border-radius: 10px;
                border: 5px solid rgb(70, 63, 63);
            }

            @media screen and (max-width: 768px) {
                .navbar ul {
                    flex-direction: column;
                    gap: 15px;
                }
            }

             .center-container {
            display: flex;
            justify-content: center; /* Centers horizontally */
            align-items: center; 
             }/* Centers vertically */

            footer {
                background: rgb(26, 7, 10);
                color: white;
                text-align: center;
                padding: 10px;
                position: -ms-page-footer;
                width: 100%;
            }

        </style>
    </head>
    <body>

<header>
    <h1>WELCOME TO MY WEBSITE</h1>
</header>

<nav>
<a href="index.html" class="tab-btn">Home</a>

    <div class="dropdown">
    <a href="media.html" class="dropbtn">My Media</a>

    <a href="secondary.html">Secondary School</a>
    <a href="diploma.html">Diploma</a>

  </div>
</div>

</nav>

        </a>
    </div>
    
</section>

<footer>
    <p>&copy; 2026 Nur Sumayyah. All rights reserved.</p>
</footer>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const tabButtons = document.querySelectorAll('.tab-btn');

        tabButtons.forEach(button => {
            button.addEventListener('click', function(event) {
                tabButtons.forEach(tab => tab.classList.remove('active'));
                this.classList.add('active');
            });
        });

        const currentPage = window.location.pathname.split('/').pop();
        tabButtons.forEach(button => {
            if (button.getAttribute('href') === currentPage || (currentPage === '' && button.getAttribute('href') === 'index.html')) {
                button.classList.add('active');
            }
        });
    });
</script>

    </body>
</html>
